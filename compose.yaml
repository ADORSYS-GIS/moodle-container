services:
  moodle-init:
    build: &moodle_build
      context: .
      dockerfile: Dockerfile
    environment: &moodle_env
      SITE_URL: http://localhost:8080
      MOODLE_LANGUAGE: en
      MOODLE_SITENAME: "Local Development Moodle"
      MOODLE_SITESUMMARY: "Moodle development instance powered by Nginx and Redis"
      MOODLE_USERNAME: admin
      MOODLE_PASSWORD: MoodleAdmin123!
      MOODLE_EMAIL: admin@local.moodle
      DB_TYPE: mariadb
      DB_HOST: mariadb
      DB_HOST_PORT: 3306
      DB_NAME: moodle
      DB_USER: moodle_user
      DB_PASS: moodle_pass
      DB_PREFIX: mdl_
      REDIS_SESSION_ID_HOST: redis
      REDIS_SESSION_ID_PORT: 6379
      REDIS_SESSION_ID_AUTH_STRING: "moodledevpass"
      REDIS_SESSION_IP_AND_PORT: redis:6379
      REDIS_SESSION_AUTH_STRING: "moodledevpass"
      REDIS_APP_IP_AND_PORT: redis:6379
      REDIS_APP_AUTH_STRING: "moodledevpass"
      REDIS_LOCK_HOST_AND_PORT: redis:6379
      REDIS_LOCK_AUTH_STRING: "moodledevpass"
      ENABLE_FRESHCLAM: "no"
      ENABLE_MOOSH_BOOTSTRAP: "no"
      ENABLE_OBJECTFS: "yes"
      SSLPROXY: "false"
      NOEMAIL_EVER: "false"
      CURL_SECURITY_BLOCKED_HOSTS: "0.0.0.0\n169.254.169.254\n0000::1"
      CURL_SECURITY_ALLOWED_PORTS: "80\n443\n8080\n8180"
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_PROTOCOL: "tls"
      MOODLE_MAIL_NOREPLY_ADDRESS: "noreply@local.moodle"
      MOODLE_MAIL_PREFIX: "[Moodle]"
      DB_READ_REPLICA_HOST: ""
      DB_READ_REPLICA_PORT: "3306"
      DB_READ_REPLICA_USER: ""
      DB_READ_REPLICA_PASSWORD: ""
    entrypoint:
      - /opt/setup_moodle.sh
    volumes:
      - moodledata_data:/moodleroot/moodledata
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      # plugin-downloader:
      #   condition: service_completed_successfully

  moodle:
    build: *moodle_build
    entrypoint:
      - /bin/sh
      - -c
      - |
        . /opt/setup_moodle.sh
        if [ "$${ENABLE_OBJECTFS:-no}" = "yes" ] && ! grep -q "alternative_file_system_class" /moodleroot/moodle/config.php && [ -d /moodleroot/moodle/admin/tool/objectfs/classes ]; then
          echo "Injecting ObjectFS into config.php from Compose (conditional on plugin availability)..."
          sed -i "/require_once/i if (is_dir('/moodleroot/moodle/admin/tool/objectfs/classes')) { \$$CFG->alternative_file_system_class = '\\\\tool_objectfs\\\\s3_file_system'; }" /moodleroot/moodle/config.php
          sed -i "/require_once/i \$$CFG->disablebyteserving = true;" /moodleroot/moodle/config.php
          sed -i "/require_once/i unset(\$$CFG->xsendfilealiases);" /moodleroot/moodle/config.php
          sed -i "/require_once/i \$$CFG->xsendfile = null;" /moodleroot/moodle/config.php
        fi
        /usr/sbin/crond
        /usr/sbin/php-fpm84
        /usr/sbin/nginx -g 'daemon off;'
    ports:
      - "8080:8080"
    environment:
      <<: *moodle_env
      ENABLE_OBJECTFS: "yes"
      OBJECTFS_S3_KEY: minioadmin
      OBJECTFS_S3_SECRET: minioadmin
      OBJECTFS_S3_BUCKET: moodle
      OBJECTFS_S3_REGION: us-east-1
      OBJECTFS_S3_BASE_URL: http://minio.local:9000
      OBJECTFS_KEY_PREFIX: objectfs/
      OBJECTFS_BUCKET_ACL: private
      OBJECTFS_ENABLE_TASKS: "yes"
      OBJECTFS_PREFER_EXTERNAL: "no"
      OBJECTFS_SIZE_THRESHOLD: 0
      OBJECTFS_MINIMUM_AGE: 0
      OBJECTFS_DELETE_LOCAL: "yes"
      OBJECTFS_CONSISTENCY_DELAY: 60
      OBJECTFS_DELETE_EXTERNAL: 2
      OBJECTFS_ENABLE_PRESIGNED_URLS: "no"
      OBJECTFS_PRESIGNED_MIN_FILE_SIZE: 0
      OBJECTFS_PRESIGNED_EXPIRATION: 86400
      OBJECTFS_PRESIGNED_WHITELIST: ""
      OBJECTFS_SIGNING_METHOD: s3
    volumes:
      - moodledata_data:/moodleroot/moodledata
      - objectfs_plugin:/moodleroot/moodle/admin/tool/objectfs:ro
      - oidc_plugin:/moodleroot/moodle/auth/oidc:ro
      # - plugins_downloads:/moodleroot/moodle/plugins/downloaded:ro
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      moodle-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      objectfs-downloader:
        condition: service_completed_successfully
      objectfs-init:
        condition: service_completed_successfully
      oidc-init:
        condition: service_completed_successfully
      # backup-restorer:
      #   condition: service_completed_successfully

  mariadb:
    image: mariadb:10.11
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_USER: moodle_user
      MARIADB_PASSWORD: moodle_pass
      MARIADB_DATABASE: moodle
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ./.docker/keycloak:/opt/keycloak/data/import:ro
      - keycloak_data:/opt/keycloak/data
    ports:
      - "8180:8080"
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/8080 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass "moodledevpass" --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "moodledevpass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9090"
    ports:
      - "19000:9000"
      - "19090:9090"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_DOMAIN: minio.local
    volumes:
      - minio_data:/data
    networks:
      default:
        aliases:
          - minio.local
          - moodle.minio.local
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5

  minio-init:
    image: minio/mc:latest
    volumes:
      - ./.docker/minio/policy.json:/tmp/policy.json:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |-
        set -e
        mc alias set bucketer http://minio:9000 minioadmin minioadmin
        mc mb bucketer/moodle --ignore-existing
        mc anonymous set-json /tmp/policy.json bucketer/moodle
    depends_on:
      minio:
        condition: service_healthy

  objectfs-downloader:
    image: alpine/git:latest
    volumes:
      - objectfs_plugin:/plugin_downloads
      - ./.docker/plugin-downloader/download_tool_objectfs.sh:/scripts/download_tool_objectfs.sh:ro
    environment:
      PLUGIN_DIR: /plugin_downloads
      PLUGIN_REPO: https://github.com/catalyst/moodle-tool_objectfs.git
      PLUGIN_BRANCH: MOODLE_404_STABLE
    entrypoint: /bin/sh
    command:
      - -c
      - "/scripts/download_tool_objectfs.sh"

  objectfs-init:
    build: *moodle_build
    entrypoint:
      - /bin/sh
      - -c
      - |
        . /opt/setup_moodle.sh
        sh /scripts/objectfs_init.sh
    environment:
      <<: *moodle_env
      ENABLE_OBJECTFS: "yes"
      OBJECTFS_S3_KEY: minioadmin
      OBJECTFS_S3_SECRET: minioadmin
      OBJECTFS_S3_BUCKET: moodle
      OBJECTFS_S3_REGION: us-east-1
      OBJECTFS_S3_BASE_URL: http://minio.local:9000
      OBJECTFS_KEY_PREFIX: objectfs/
      OBJECTFS_BUCKET_ACL: private
      OBJECTFS_ENABLE_TASKS: "yes"
      OBJECTFS_PREFER_EXTERNAL: "no"
      OBJECTFS_SIZE_THRESHOLD: 0
      OBJECTFS_MINIMUM_AGE: 0
      OBJECTFS_DELETE_LOCAL: "yes"
      OBJECTFS_CONSISTENCY_DELAY: 60
      OBJECTFS_DELETE_EXTERNAL: 2
      OBJECTFS_ENABLE_PRESIGNED_URLS: "no"
      OBJECTFS_PRESIGNED_MIN_FILE_SIZE: 0
      OBJECTFS_PRESIGNED_EXPIRATION: 86400
      OBJECTFS_PRESIGNED_WHITELIST: ""
      OBJECTFS_SIGNING_METHOD: s3
    volumes:
      - moodledata_data:/moodleroot/moodledata
      - objectfs_plugin:/moodleroot/moodle/admin/tool/objectfs:ro
      - ./.docker/objectfs/objectfs_init.sh:/scripts/objectfs_init.sh:ro
      - ./.docker/objectfs/configure_objectfs.php:/scripts/configure_objectfs.php:ro
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      moodle-init:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      objectfs-downloader:
        condition: service_completed_successfully

  oidc-downloader:
    image: alpine/git:latest
    volumes:
      - oidc_plugin:/plugin_downloads
      - ./.docker/plugin-downloader/download_auth_oidc.sh:/scripts/download_auth_oidc.sh:ro
    environment:
      PLUGIN_DIR: /plugin_downloads
      PLUGIN_REPO: https://github.com/microsoft/moodle-auth_oidc.git
      PLUGIN_BRANCH: MOODLE_501_STABLE
    entrypoint: /bin/sh
    command:
      - -c
      - "/scripts/download_auth_oidc.sh"

  oidc-init:
    build: *moodle_build
    entrypoint:
      - /bin/sh
      - -c
      - |
        . /opt/setup_moodle.sh
        sh /scripts/oidc_init.sh
    environment:
      <<: *moodle_env
    volumes:
      - moodledata_data:/moodleroot/moodledata
      - oidc_plugin:/moodleroot/moodle/auth/oidc:ro
      - ./.docker/oidc/oidc_init.sh:/scripts/oidc_init.sh:ro
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      moodle-init:
        condition: service_completed_successfully
      oidc-downloader:
        condition: service_completed_successfully

