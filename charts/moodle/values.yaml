# ─────────────────────────────────────────────────────────────────────────────
# Moodle Chart using bjw-s/common library
# ─────────────────────────────────────────────────────────────────────────────

global:
  nameOverride: ""
  fullnameOverride: ""

# ─────────────────────────────────────────────────────────────────────────────
# Core Application & Infrastructure Configurations
# ─────────────────────────────────────────────────────────────────────────────

moodle:
  siteUrl: "http://moodle.local"
  language: "en"
  siteName: "Moodle"
  siteSummary: "Moodle LMS running on Kubernetes"
  username: "admin"
  email: "admin@moodle.local"
  password: ""
  existingSecret: ""
  enableFreshclam: "no"
  enableMooshBootstrap: "no"
  enableObjectfs: "no"

externalDatabase:
  type: "mariadb"
  host: ""
  port: 3306
  database: "moodle"
  user: "moodle_user"
  password: ""
  existingSecret: ""
  existingSecretPasswordKey: "db-password"

externalRedis:
  host: ""
  port: 6379
  password: ""
  existingSecret: ""
  existingSecretPasswordKey: "redis-password"

# ─────────────────────────────────────────────────────────────────────────────
# bjw-s/common configuration
# ─────────────────────────────────────────────────────────────────────────────

controllers:
  main:
    type: deployment
    replicas: 1
    
    # Pod-level annotations and labels can be added here if needed
    annotations: {}
    labels: {}
    
    containers:
      main:
        image:
          repository: ghcr.io/adorsys-gis/moodle-container
          tag: "latest"
          pullPolicy: IfNotPresent
        
        env:
          # Moodle site settings mapped from above
          SITE_URL: '{{ .Values.moodle.siteUrl }}'
          MOODLE_LANGUAGE: '{{ .Values.moodle.language }}'
          MOODLE_SITENAME: '{{ .Values.moodle.siteName }}'
          MOODLE_SITESUMMARY: '{{ .Values.moodle.siteSummary }}'
          MOODLE_USERNAME: '{{ .Values.moodle.username }}'
          MOODLE_EMAIL: '{{ .Values.moodle.email }}'
          ENABLE_FRESHCLAM: '{{ .Values.moodle.enableFreshclam }}'
          ENABLE_MOOSH_BOOTSTRAP: '{{ .Values.moodle.enableMooshBootstrap }}'
          ENABLE_OBJECTFS: '{{ .Values.moodle.enableObjectfs }}'
          
          # Database settings mapped from above
          DB_TYPE: '{{ .Values.externalDatabase.type }}'
          DB_HOST: '{{ .Values.externalDatabase.host }}'
          DB_HOST_PORT: '{{ .Values.externalDatabase.port }}'
          DB_NAME: '{{ .Values.externalDatabase.database }}'
          DB_USER: '{{ .Values.externalDatabase.user }}'
          DB_PREFIX: "mdl_"
          
          # Redis settings mapped from above
          REDIS_SESSION_ID_HOST: '{{ .Values.externalRedis.host }}'
          REDIS_SESSION_ID_PORT: '{{ .Values.externalRedis.port }}'
          REDIS_SESSION_IP_AND_PORT: '{{ .Values.externalRedis.host }}:{{ .Values.externalRedis.port }}'
          REDIS_APP_IP_AND_PORT: '{{ .Values.externalRedis.host }}:{{ .Values.externalRedis.port }}'
          REDIS_LOCK_HOST_AND_PORT: '{{ .Values.externalRedis.host }}:{{ .Values.externalRedis.port }}'

          # Secrets integration (maps to our custom secret generation templates or existing keys)
          MOODLE_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: '{{ default (printf "%s-moodle" (include "bjw-s.common.lib.chart.names.fullname" $)) $.Values.moodle.existingSecret }}'
                key: moodle-password
          DB_PASS:
            valueFrom:
              secretKeyRef:
                name: '{{ default (printf "%s-externaldb" (include "bjw-s.common.lib.chart.names.fullname" $)) $.Values.externalDatabase.existingSecret }}'
                key: '{{ $.Values.externalDatabase.existingSecretPasswordKey | default "db-password" }}'
          REDIS_SESSION_ID_AUTH_STRING:
            valueFrom:
              secretKeyRef:
                name: '{{ default (printf "%s-externalredis" (include "bjw-s.common.lib.chart.names.fullname" $)) $.Values.externalRedis.existingSecret }}'
                key: '{{ $.Values.externalRedis.existingSecretPasswordKey | default "redis-password" }}'
          REDIS_SESSION_AUTH_STRING:
            valueFrom:
              secretKeyRef:
                name: '{{ default (printf "%s-externalredis" (include "bjw-s.common.lib.chart.names.fullname" $)) $.Values.externalRedis.existingSecret }}'
                key: '{{ $.Values.externalRedis.existingSecretPasswordKey | default "redis-password" }}'
          REDIS_APP_AUTH_STRING:
            valueFrom:
              secretKeyRef:
                name: '{{ default (printf "%s-externalredis" (include "bjw-s.common.lib.chart.names.fullname" $)) $.Values.externalRedis.existingSecret }}'
                key: '{{ $.Values.externalRedis.existingSecretPasswordKey | default "redis-password" }}'
          REDIS_LOCK_AUTH_STRING:
            valueFrom:
              secretKeyRef:
                name: '{{ default (printf "%s-externalredis" (include "bjw-s.common.lib.chart.names.fullname" $)) $.Values.externalRedis.existingSecret }}'
                key: '{{ $.Values.externalRedis.existingSecretPasswordKey | default "redis-password" }}'

        probes:
          liveness:
            enabled: true
            type: HTTP
            path: /login/index.php
            spec:
              initialDelaySeconds: 600
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 6
              successThreshold: 1
          readiness:
            enabled: true
            type: HTTP
            path: /login/index.php
            spec:
              initialDelaySeconds: 30
              periodSeconds: 5
              timeoutSeconds: 3
              failureThreshold: 6
              successThreshold: 1
              
        resources: {}

service:
  main:
    controller: main
    type: ClusterIP
    ports:
      http:
        port: 8080

ingress:
  main:
    enabled: false
    className: ""
    hosts:
      - host: moodle.local
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: main
              port: http

persistence:
  moodledata:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 8Gi
    globalMounts:
      - path: /moodleroot/moodledata
