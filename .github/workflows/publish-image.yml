name: Build and Publish Moodle Nginx Image

on:
  workflow_dispatch:
    inputs:
      moodle_version:
        description: 'Moodle Version/Tag for the build'
        required: true
        default: '5.0.0'
      push_latest:
        description: 'Also tag and push as latest'
        type: boolean
        required: true
        default: true

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase repository info
        id: repo_info
        run: |
          echo "owner=${OWNER,,}" >> "$GITHUB_OUTPUT"
          echo "repo=${REPO,,}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo_info.outputs.owner }}/${{ steps.repo_info.outputs.repo }}
          tags: |
            type=raw,value=${{ github.event.inputs.moodle_version }}
            type=raw,value=latest,enable=${{ github.event.inputs.push_latest == 'true' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            MOODLE_BUILD_URL=https://download.moodle.org/download.php/direct/stable500/moodle-latest-500.tgz
